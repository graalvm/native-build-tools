grund_config_version = 1
project_name = "Native Build Tools"

[reference]
marker = "§"
trigger = "$$"
strict = false
require_grounding = false
inline_style = "citation-with-note" # citation-with-note | citation-only
inline_note_suggested_lines = 1
inline_note_max_lines = 4
inline_note_max_columns = 100
warn_on_suggested = false

[id]
format = "{kind}-{slug}" # placeholders: {kind} required; use {number}, {slug}, or both
section_separator = "."
section_heading_levels = "strict" # strict | warn | loose
slug_pattern = "[a-z0-9][a-z0-9-]*"

[[kinds]]
prefix = "GRUND"
file = "docs/spec/grund.md"
title = "Project motivation"

[[kinds]]
prefix = "GOAL"
file = "docs/spec/goals.md"
title = "Project direction and outcomes"

[[kinds]]
prefix = "NGOAL"
file = "docs/spec/non-goals.md"
title = "Project non-goals and out-of-scope proposals"

[[kinds]]
prefix = "REQ"
file = "docs/spec/requirements.md"
title = "Cross-cutting requirements and constraints"

[[kinds]]
prefix = "FS"
file = "docs/spec/functional-spec.md"
title = "Repository functional specification"

[[kinds]]
prefix = "AR"
file = "docs/spec/architecture.md"
title = "Repository architecture"

[[kinds]]
prefix = "GRADLE"
file = "docs/spec/gradle-plugin.md"
title = "Gradle plugin behavior and architecture"

[[kinds]]
prefix = "MAVEN"
file = "docs/spec/maven-plugin.md"
title = "Maven plugin behavior and architecture"

[[kinds]]
prefix = "COMMON"
file = "docs/spec/common.md"
title = "Shared common library behavior and architecture"

[[kinds]]
prefix = "TESTING"
file = "docs/spec/testing.md"
title = "Native test, sample, and fixture behavior"

[[kinds]]
prefix = "BUILD"
file = "docs/spec/build-infra.md"
title = "Build, documentation, and release infrastructure"

[[kinds]]
prefix = "CI"
file = "docs/spec/ci.md"
title = "Pull request and repository CI workflows"

[[kinds]]
prefix = "E2E"
file = "docs/spec/e2e.md"
title = "End-to-end and functional test execution"

[[kinds]]
prefix = "DEC"
file = "docs/spec/decisions.md"
title = "Project decisions and tradeoffs"

[[kinds]]
prefix = "RM"
file = "docs/spec/roadmap.md"
title = "Planned milestones and sequencing"

[[kinds]]
prefix = "GLOSS"
file = "docs/spec/glossary.md"
title = "Glossary of domain terms"

[scan]
include = ["docs/spec", "build-logic", "common", "native-gradle-plugin", "native-maven-plugin", "samples", "test-support", ".github/workflows", ".github/actions"]
exclude = ["target", "node_modules", ".git", "dist", "build", ".gradle", ".venv"]
extensions = ["md", "yml", "yaml", "rs", "go", "java", "kt", "ts", "tsx", "js", "py", "c", "cpp", "swift", "scala", "rb", "php", "cs"]
comment_prefixes = ["//", "#", ";", "--", "*", "/*"]
docstring_python = true
respect_gitignore = true

[output]
format = "text" # text | json
color = "auto" # auto | always | never
relative_paths = true

[fmt.cross_refs]
enabled = true
anchor_format = "github" # github | gitlab | mkdocs | pandoc | none
