grund_config_version = 1
project_name = "root"
project_description = "Workspace-level specs, release, CI, and shared Native Build Tools behavior"

[workspace]

members = ["common", "native-gradle-plugin", "native-maven-plugin"]

include_root = true

[reference]

# default; rare character that prefixes a citation in prose
marker = "§"

# default; typed sequence rewritten to marker by IDE plugin and `grund fmt`
trigger = "$$"

# if true, bare citations are NOT recognized
strict = true

# default; if true, `check` flags source files that cite no declared ID
require_grounding = false

# default; alt: "citation-only"
inline_style = "citation-with-note"

# soft cap; advisory unless warn_on_suggested = true
inline_note_suggested_lines = 1

# hard cap (error)
inline_note_max_lines = 12

# hard cap (error)
inline_note_max_columns = 160

# if true, soft-cap overruns surface as `check` warnings
warn_on_suggested = false

[id]

# placeholders: {kind} required; use {number}, {slug}, or both
format = "{kind}-{slug}"

section_separator = "."

# strict | warn | loose
section_heading_levels = "strict"

slug_pattern = "[a-z0-9][a-z0-9-]*"

[[kinds]]
prefix = "GRUND"
file = "docs/spec/grund.md"
title = "Why: project motivation"

[[kinds]]
prefix = "GOAL"
file = "docs/spec/goals.md"
title = "Where: project direction and outcomes"

[[kinds]]
prefix = "NGOAL"
file = "docs/spec/non-goals.md"
title = "Project non-goals and out-of-scope proposals"

[[kinds]]
prefix = "REQ"
file = "docs/spec/requirements.md"
title = "Cross-cutting requirements and constraints"

[[kinds]]
prefix = "AR"
folder = "docs/spec/architecture"
title = "How: high-level implementation, structure, and design"

[[kinds]]
prefix = "FS"
folder = "docs/spec/functional"
title = "What: behavior, requirements, and constraints"

[[kinds]]
prefix = "E2E"
folder = "docs/spec"
title = "Executable user scenarios"

[[kinds]]
prefix = "DEC"
folder = "docs/spec/decisions"
title = "Project decisions and tradeoffs"

[[kinds]]
prefix = "GLOSS"
file = "docs/spec/glossary.md"
title = "Glossary of domain terms"

[scan]

include = ["AGENTS.md", ".pre-commit-config.yaml", "docs/spec", "build-logic", "samples", "test-support", ".github/workflows", ".github/actions"]

exclude = ["target", "node_modules", ".git", "dist", "build", ".gradle", ".venv"]

extensions = ["md", "yml", "yaml", "rs", "go", "java", "groovy", "gradle", "kt", "ts", "tsx", "js", "py", "c", "cpp", "swift", "scala", "rb", "php", "cs"]

comment_prefixes = ["//", "#", ";", "--", "*", "/*"]

docstring_python = true

respect_gitignore = true

[output]

# text | json
format = "text"

# auto | always | never
color = "auto"

# show paths relative to config root in reports
relative_paths = true

[fmt.cross_refs]

# default; false opts out of generated Markdown links
enabled = true

# default; one of github | gitlab | mkdocs | pandoc | none
anchor_format = "github"

[citations]
default = "may"

[citations.GOAL]
should = ["*/GRUND|*/GOAL"]

[citations.NGOAL]
should = ["*/GRUND|*/GOAL|*/NGOAL"]

[citations.REQ]
should = ["*/GRUND|*/GOAL|*/REQ"]

[citations.FS]
should = ["*/REQ|*/GOAL|*/FS"]
should-not = ["*/AR"]

[citations.AR]
should = ["*/FS|*/REQ|*/GOAL|*/AR"]

[citations.E2E]
should = ["*/FS"]

[citations.DEC]
should = ["*/FS|*/AR|*/REQ|*/GOAL|*/NGOAL|*/DEC"]

[citations.code]
should = ["*/FS|*/AR|*/E2E"]
