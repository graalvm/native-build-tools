import groovy.json.JsonOutput

def matrixDefault = [
        "java-version": [ "17.0.12" ],
        "os": [ "ubuntu-22.04", "windows-latest", "macos-latest" ]
]

def latestMatrixDefault = [
        "java-version": [ "17.0.12" ],
        "os": [ "ubuntu-22.04" ]
]

// # Following versions are disabled temporarily in order to speed up PR testing  "7.3.3", "7.2", "7.1", "6.8.3",
def gradleVersions = [
        "gradle-version": ["current", "8.4", "8.14.2", "9.0.0"],
]

def gradleCachedVersions = [
        "gradle-config-cache-version": ["current", "9.0.0"]
]

def nativeBuildToolsVersion = extensions.findByType(VersionCatalogsExtension)
        .named("libs")
        .findVersion("nativeBuildTools")
        .get()
        ?.requiredVersion

def runFullGradleMatrix = !nativeBuildToolsVersion.endsWith("-SNAPSHOT")

def latestGradleVersions = [
        "gradle-version": [gradleVersions["gradle-version"].last()]
]

def latestGradleCachedVersions = [
        "gradle-config-cache-version": [gradleCachedVersions["gradle-config-cache-version"].last()]
]

sourceSets.configureEach { sourceSet ->
    if (sourceSet.name == 'functionalTest') {
        tasks.register("dumpFunctionalTestList") {
            doLast {
                def matrix = [
                        test: []
                ]

                // add all defaults
                matrix.putAll(runFullGradleMatrix ? matrixDefault : latestMatrixDefault)

                // add gradle specific stuff
                if (matrixType == "gradle") {
                    matrix.putAll(runFullGradleMatrix ? gradleVersions : latestGradleVersions)
                }

                if (matrixType == "gradleCached") {
                    matrix.putAll(runFullGradleMatrix ? gradleCachedVersions : latestGradleCachedVersions)
                }

                // add functional tests
                sourceSet.allSource.each {
                    matrix.test << it.name.substring(0, it.name.lastIndexOf('.'))
                }

                String githubOut = System.getenv("GITHUB_OUTPUT")
                if (githubOut != null) {
                    new File(githubOut).withWriterAppend {
                        it.println "matrix=${JsonOutput.toJson(matrix)}"
                    }
                } else {
                    println "Warning: GITHUB_OUTPUT environment variable not found"
                }
                println "Build Matrix: $matrix"
            }
        }
    }
}
