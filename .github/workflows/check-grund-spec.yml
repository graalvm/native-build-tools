# Pull request spec gate: validates grounded docs, source comments, and workflow citations.
# §CI-check-grund-spec
name: "Check grund spec"

on:
  pull_request:
    paths:
      - 'docs/spec/**'
      - '.agents/grund.toml'
      - 'AGENTS.md'
      - 'common/**'
      - 'native-gradle-plugin/**'
      - 'native-maven-plugin/**'
      - 'build-logic/**'
      - 'test-support/**'
      - 'samples/**'
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:

concurrency:
  group: "workflow = ${{ github.workflow }}, ref = ${{ github.event.ref }}, pr = ${{ github.event.pull_request.id }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.repository != 'graalvm/native-build-tools' }}

permissions:
  contents: read

env:
  # Bump to refresh the cached binary. Validated locally against grund 0.4.0.
  GRUND_VERSION: "0.4.0"

jobs:
  check-grund-spec:
    name: "Validate spec citations (grund check)"
    runs-on: ubuntu-22.04
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4
      - name: "🦀 Install Rust toolchain"
        uses: dtolnay/rust-toolchain@stable
      - name: "📦 Cache grund binary"
        id: cache-grund
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/grund
          key: grund-${{ env.GRUND_VERSION }}-${{ runner.os }}
      - name: "🔧 Install grund"
        if: steps.cache-grund.outputs.cache-hit != 'true'
        # TODO: pin with `--tag v${GRUND_VERSION}` once the grund release tag scheme is confirmed;
        # the binary is otherwise pinned per-run by the GRUND_VERSION cache key above.
        run: cargo install --git https://github.com/vjovanov/grund
      - name: "✅ grund check"
        # Validates that every §<ID> citation in docs, workflows, and source doc-comments resolves,
        # and that section headings and inline-note limits hold. See AGENTS.md and .agents/grund.toml.
        run: grund check
