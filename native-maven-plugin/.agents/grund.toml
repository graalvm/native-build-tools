grund_config_version = 1
project_name = "Native Maven Plugin"

[reference]
marker = "§"
trigger = "$$"
strict = false
require_grounding = false
inline_style = "citation-with-note" # citation-with-note | citation-only
inline_note_suggested_lines = 1
inline_note_max_lines = 12
inline_note_max_columns = 160
warn_on_suggested = false

[id]
format = "{kind}-{slug}" # placeholders: {kind} required; use {number}, {slug}, or both
section_separator = "."
section_heading_levels = "strict" # strict | warn | loose
slug_pattern = "[a-z0-9][a-z0-9-]*"

[[kinds]]
prefix = "GRUND"
folder = ".."
title = "Maven plugin purpose"

[[kinds]]
prefix = "GOAL"
folder = ".."
title = "Maven plugin goals"

[[kinds]]
prefix = "NGOAL"
folder = ".."
title = "Repository non-goals"

[[kinds]]
prefix = "REQ"
folder = ".."
title = "Maven plugin requirements"

[[kinds]]
prefix = "FS"
folder = ".."
title = "Maven plugin functional specification"

[[kinds]]
prefix = "AR"
folder = ".."
title = "Maven plugin architecture"

[[kinds]]
prefix = "CI"
folder = ".."
title = "Repository CI workflows"

[[kinds]]
prefix = "E2E"
folder = ".."
title = "Maven plugin end-to-end tests"

[[kinds]]
prefix = "DEC"
folder = ".."
title = "Repository decisions"

[[kinds]]
prefix = "RM"
folder = ".."
title = "Repository roadmap"

[[kinds]]
prefix = "GLOSS"
folder = ".."
title = "Repository glossary"

[scan]
include = ["docs", "../docs/spec", "../native-gradle-plugin/docs", "src/main", "src/test", "src/functionalTest", "src/testFixtures", "reproducers"]
exclude = ["target", "node_modules", ".git", "dist", "build", ".gradle", ".venv"]
extensions = ["md", "yml", "yaml", "rs", "go", "java", "kt", "ts", "tsx", "js", "py", "c", "cpp", "swift", "scala", "rb", "php", "cs"]
comment_prefixes = ["//", "#", ";", "--", "*", "/*"]
docstring_python = true
respect_gitignore = true

[output]
format = "text" # text | json
color = "auto" # auto | always | never
relative_paths = true

[fmt.cross_refs]
enabled = true
anchor_format = "github" # github | gitlab | mkdocs | pandoc | none
